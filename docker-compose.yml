services:
  next:
    build: .
    container_name: memorizar-app
    ports:
      - "3000:3000"
      - "5555:5555"
    working_dir: /app
    volumes:
      - .:/app
      - next_node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      - db
    command: npm run dev

  db:
    image: postgres:15
    container_name: memorizar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: memorizar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  next_node_modules: